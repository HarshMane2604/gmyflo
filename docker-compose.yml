version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymflo_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymflo_frontend
    ports:
      - "3000:3000"
    environment:
      # Use the Docker service name for internal routing or localhost if bridging ports directly
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000/gym
    depends_on:
      - backend
    restart: unless-stopped
